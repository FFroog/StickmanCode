<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stickman Jump</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      color: #a9c4f5;
    }

    #game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #hud {
      width: 700px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #9aa3b2;
      padding: 0 4px;
    }

    #score-display,
    #highscore-display {
      display: flex;
      gap: 6px;
      align-items: baseline;
    }

    #score-display span,
    #highscore-display span {
      font-size: 1.1rem;
      font-weight: 500;
      color: #a9c4f5;
    }

    #game-canvas {
      display: block;
      border-radius: 10px;
      border: 1.5px solid #2e3a5e;
      background: #0f172a;
      /* The canvas has a built-in pixel size; CSS just scales the display */
      width: 700px;
      height: 250px;
      cursor: pointer;
    }

    #controls-hint {
      font-size: 0.78rem;
      color: #5a6478;
      letter-spacing: 0.04em;
    }

    /* Overlay shown before start or on game over — toggled by JS */
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 700px;
      height: 250px;
      border-radius: 10px;
      background: rgba(10, 15, 30, 0.82);
      pointer-events: none; /* JS should set to 'auto' when active */
    }

    #overlay.hidden {
      display: none;
    }

    #overlay-title {
      font-size: 1.4rem;
      font-weight: 500;
      color: #a9c4f5;
      letter-spacing: 0.05em;
    }

    #overlay-sub {
      font-size: 0.85rem;
      color: #9aa3b2;
    }

    #restart-btn {
      margin-top: 6px;
      padding: 8px 28px;
      background: transparent;
      border: 1px solid #3a5294;
      border-radius: 6px;
      color: #a9c4f5;
      font-size: 0.85rem;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.15s, border-color 0.15s;
    }

    #restart-btn:hover {
      background: #1e2f55;
      border-color: #6a8fda;
    }

    #canvas-container {
      position: relative;
    }
  </style>
</head>
<body>

  <h1>Stickman Jump</h1>

  <div id="game-wrapper">
    <div id="hud">
      <div id="score-display">Score <span id="score">0</span></div>
      <div id="highscore-display">Best <span id="highscore">0</span></div>
    </div>

    <div id="canvas-container">
      <canvas id="game-canvas" width="700" height="250"></canvas>

      <div id="overlay">
        <div id="overlay-title">Stickman Jump</div>
        <div id="overlay-sub">Tap to start</div>
        <button id="restart-btn">Start</button>
      </div>
    </div>

    <p id="controls-hint">Space to jump - Right Arrow to move right - Left Arrow to move left </p>
  </div>
  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const torsoLen = 24;
    const legLen = 20;
    const armLen = 16;
    let bx= 350; 
    let by = 240; 
    let bv = 0;
    let canJump = true;
    const GRAV = .1;
    const pad = { x: 200, y: 160, w: 80, h: 10 };

function drawPad() { 
  ctx.fillStyle = 'white';
  ctx.fillRect(pad.x, pad.y, pad.w, pad.h);
}
    function drawBall(x, y, bva){
    const r = 10;
    ctx.fillStyle = 'red';
    ctx.strokeStyle = 'red';
    ctx.beginPath();
    ctx.arc(x, y - legLen - torsoLen-3, r, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(x, y - legLen - torsoLen);
    ctx.lineTo(x, y - legLen);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x, y - legLen);
    ctx.lineTo(x - 8, y);
    ctx.moveTo(x, y - legLen);
    ctx.lineTo(x + 8, y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x, y - legLen - torsoLen + 6);
    ctx.lineTo(x - armLen, y - legLen - torsoLen + 18);
    ctx.moveTo(x, y - legLen - torsoLen + 6);
    ctx.lineTo(x + armLen, y - legLen - torsoLen + 18);
    ctx.stroke();
    }
   
    function gameLoop(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        bv += GRAV;
        by += bv;
        if(by > 240 ){
            by = 240;
            bv = 0;       
            canJump = true;
        }
        if(by >= pad.y && by <= pad.y + bv + 5 && bx >= pad.x - 4 && bx <= pad.x + 84 && bv > 0){
            by = pad.y;
            bv = 0;
            canJump = true;
        }
        if(bx > 699){
            bx = 1;
            
        }
        if(bx < 1){
            bx = 700;
        }
        if(keys['Space'] && canJump && (by >= 240 || by <= pad.y)){
          bv = -5; 
          canJump = false;
        }
        if(keys['ArrowRight']){
            bx += 1;
        }
        if(keys['ArrowLeft']){
            bx -= 1;
        }
        drawBall(bx, by);
        drawPad();
        requestAnimationFrame(gameLoop);
    }
    const keys = {};

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
    });
    window.addEventListener('keyup', e=>{
        keys[e.code] = false;
    });
    document.getElementById('restart-btn').addEventListener('click', () => {
        gameRunning = true;
        overlay.classList.add('hidden');

        
        gameLoop();
    });
    
  </script>

</body>
</html>
