<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncing Balls</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
    overflow: hidden;
  }

  canvas {
    display: block;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    cursor: crosshair;
  }

  #ui {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    align-items: center;
  }

  button {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #ccc;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    letter-spacing: 0.03em;
  }

  button:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
  }

  label {
    font-size: 12px;
    color: #666;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.04em;
  }

  input[type=range] {
    width: 80px;
    accent-color: #7c6aff;
  }

  #info {
    font-size: 11px;
    color: #444;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <button id="startGame">Start Game</button>
  <button id="stopGame">Stop Game</button>
  <label>gravity <input type="range" id="gravSlider" min="0" max="2000" step="10" value="800"></label>
  <label>bounce <input type="range" id="bounceSlider" min="0" max="100" step="1" value="75"></label>
</div>
<div id="info">click canvas to throw a ball &nbsp;·&nbsp; drag to aim</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = Math.min(window.innerWidth - 40, 700);
  H = canvas.height = Math.min(window.innerHeight - 120, 500);
}
resize();
window.addEventListener('resize', resize);

let GRAVITY = 800;
let RESTITUTION = 0.75;
let FRICTION = 0.995;

document.getElementById('gravSlider').addEventListener('input', e => GRAVITY = +e.target.value);
document.getElementById('bounceSlider').addEventListener('input', e => RESTITUTION = +e.target.value / 100);

const COLORS = [
  { fill: '#ff6b6b', shadow: '#ff000055' },
  { fill: '#ffd93d', shadow: '#ffcc0055' },
  { fill: '#6bcb77', shadow: '#00ff4455' },
  { fill: '#4d96ff', shadow: '#0066ff55' },
  { fill: '#c77dff', shadow: '#aa00ff55' },
  { fill: '#ff9f43', shadow: '#ff660055' },
  { fill: '#48dbfb', shadow: '#00ccff55' },
  { fill: '#ff6bcd', shadow: '#ff00aa55' },
];

let colorIdx = 0;
let balls = [];

let mouseX = 0;
let mouseY = 0;
let canvasRect = canvas.getBoundingClientRect();
window.addEventListener('resize', () => { 
    canvasRect = canvas.getBoundingClientRect();
    resize();
});
canvas.addEventListener('mousemove', e => {
    mouseX = e.clientX - canvasRect.left;
    mouseY = e.clientY - canvasRect.top;
});

function makeGuy() {
  const r = 12 + Math.random() * 18;
  const c = COLORS[colorIdx % COLORS.length];
  colorIdx++;
  return {x : mouseX, y : mouseY, vx : 1 + Math.random() * 3, vy : 2 + Math.random() * 3, r, fill: c.fill, shadow: c.shadow, trail: [] };
}

//for (let i = 0; i < 5; i++) balls.push(makeGuy());;

document.getElementById('startGame').addEventListener('click', () => { balls.push(makeGuy()); });
document.getElementById('stopGame').addEventListener('click', () => { balls = []; colorIdx = 0; });

let dragStart = null, dragCurrent = null;

window.addEventListener('keydown', e =>{
    if(e.code === 'Space' && !e.repeat){
       balls.push(makeGuy()); 
    }
});
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  dragCurrent = { ...dragStart };
});
/*
canvas.addEventListener('mousemove', e => {
  if (!dragStart) return;
  const rect = canvas.getBoundingClientRect();
  dragCurrent = { x: e.clientX - rect.left, y: e.clientY - rect.top };
});

canvas.addEventListener('mouseup', e => {
  if (!dragStart) return;
  const rect = canvas.getBoundingClientRect();
  const ex = e.clientX - rect.left, ey = e.clientY - rect.top;
  const vx = (dragStart.x - ex) * 4;
  const vy = (dragStart.y - ey) * 4;
  balls.push(makeGuy(dragStart.x, dragStart.y, vx, vy));
  dragStart = null; dragCurrent = null;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  dragStart = { x: t.clientX - rect.left, y: t.clientY - rect.top };
  dragCurrent = { ...dragStart };
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!dragStart) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  dragCurrent = { x: t.clientX - rect.left, y: t.clientY - rect.top };
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!dragStart) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.changedTouches[0];
  const ex = t.clientX - rect.left, ey = t.clientY - rect.top;
  const vx = (dragStart.x - ex) * 4;
  const vy = (dragStart.y - ey) * 4;
  balls.push(makeGuy(dragStart.x, dragStart.y, vx, vy));
  dragStart = null; dragCurrent = null;
}, { passive: false });
*/
function resolveCollisions() {
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      const a = balls[i], b = balls[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minDist = a.r + b.r;
      if (dist < minDist && dist > 0.001) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        const ma = a.r * a.r, mb = b.r * b.r, mt = ma + mb;
        a.x -= nx * overlap * mb / mt;
        a.y -= ny * overlap * mb / mt;
        b.x += nx * overlap * ma / mt;
        b.y += ny * overlap * ma / mt;
        const dvx = b.vx - a.vx, dvy = b.vy - a.vy;
        const dot = dvx * nx + dvy * ny;
        if (dot < 0) {
          const imp = (-(1 + RESTITUTION) * dot) / (1/ma + 1/mb);
          a.vx -= imp * nx / ma;
          a.vy -= imp * ny / ma;
          b.vx += imp * nx / mb;
          b.vy += imp * ny / mb;
        }
      }
    }
  }
}

let last = null;
function loop(ts) {
  const dt = last ? Math.min((ts - last) / 1000, 0.033) : 0.016;
  last = ts;

  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  for (const b of balls) {
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 18) b.trail.shift();
  }
  /*
  for (const b of balls) {
    if (b.trail.length > 1) {
      for (let i = 1; i < b.trail.length; i++) {
        const t = i / b.trail.length;
        ctx.beginPath();
        ctx.moveTo(b.trail[i-1].x, b.trail[i-1].y);
        ctx.lineTo(b.trail[i].x, b.trail[i].y);
        ctx.strokeStyle = b.fill + Math.floor(t * 80).toString(16).padStart(2,'0');
        ctx.lineWidth = b.r * 0.6 * t;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }
  } */

  for (const b of balls) {
    b.vy += GRAVITY * dt;
    b.vx *= FRICTION;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    canvas.addEventListener('mousemove', e => {
    if(e.buttons == 1){
     if(Math.abs(b.x - mouseX) <= 20 && Math.abs(b.y - mouseY) <= 20){
      b.x = mouseX;
      b.y = mouseY;
      b.vx = 0;
      b.vy = 0;
     }
    }
    });

    if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx) * RESTITUTION; }
    if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx) * RESTITUTION; }
    if (b.y + b.r > H) { b.y = H - b.r; b.vy = -Math.abs(b.vy) * RESTITUTION; b.vx *= 0.98; }
    if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy) * RESTITUTION; }
  }

  resolveCollisions();
  
  for (const b of balls) {
    ctx.save();
    ctx.shadowColor = b.shadow;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = b.fill;
    ctx.fill();
    ctx.restore();

    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.28, b.y - b.r * 0.28, b.r * 0.38, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fill();
  }
  /*
   if (dragStart && dragCurrent) {
    const dx = dragStart.x - dragCurrent.x;
    const dy = dragStart.y - dragCurrent.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(dragStart.x, dragStart.y);
    ctx.lineTo(dragCurrent.x, dragCurrent.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(dragStart.x, dragStart.y, 6 + len * 0.04, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  } */

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
